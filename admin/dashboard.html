<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZSTS CMS - 管理后台</title>
  <script>
    // Tailwind Play CDN 自定义颜色（与官网保持一致）
    window.tailwindConfig = {
      theme: {
        extend: {
          colors: {
            'zsts-green': '#006341',
            'zsts-green-dark': '#004d33',
            'zsts-green-light': '#e6f4ec',
            'zsts-sand': '#C8A882',
            'zsts-sand-light': '#F5EDE0',
          }
        }
      }
    };
  </script>
  <link href="https://cdn.tailwindcss.com" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: -apple-system, 'Noto Sans SC', sans-serif; display:flex; height:100vh; background:#f0f2f5; }
    .sidebar { width: 240px; background: #001529; color:#fff; display:flex; flex-direction:column; transition: width .25s ease; }
    .sidebar.collapsed { width: 64px; }
    .sidebar.collapsed .logo span { display:none; }
    .sidebar.collapsed nav .group-header span { display:none; }
    .sidebar.collapsed nav .group-header .arrow { display:none; }
    .sidebar.collapsed nav a .nav-label { display:none; }
    .sidebar.collapsed nav a { justify-content:center; padding:10px 0; }
    .sidebar.collapsed nav .group-header { justify-content:center; padding:10px 0; }
    .sidebar.collapsed .user-bar > div { display:none; }
    .sidebar.collapsed .user-bar button { margin-top:0; font-size:16px; padding:4px 8px; }
    .sidebar .logo { height: 64px; display:flex; align-items:center; padding:0 20px; font-size:18px; font-weight:700; color:#fff; border-bottom:1px solid rgba(255,255,255,.1); white-space:nowrap; overflow:hidden; }
    .sidebar nav { flex:1; padding:8px 0; overflow-y:auto; overflow-x:hidden; }
    .sidebar nav .group-header { display:flex; align-items:center; gap:10px; padding:10px 20px; color:rgba(255,255,255,.85); font-size:14px; font-weight:600; cursor:pointer; transition: all .15s; user-select:none; }
    .sidebar nav .group-header:hover { background:rgba(255,255,255,.06); }
    .sidebar nav .group-header .icon { font-size:16px; width:20px; text-align:center; flex-shrink:0; }
    .sidebar nav .group-header .arrow { margin-left:auto; font-size:10px; transition: transform .2s ease; color:rgba(255,255,255,.4); }
    .sidebar nav .group-header.open .arrow { transform: rotate(90deg); }
    .sidebar nav .group-children { overflow:hidden; transition: max-height .25s ease; }
    .sidebar nav .group-children.collapsed { max-height:0 !important; }
    .sidebar nav a { display:flex; align-items:center; gap:10px; padding:9px 20px 9px 36px; color:rgba(255,255,255,.55); text-decoration:none; font-size:13px; transition: all .15s; cursor:pointer; border-left:2px solid transparent; }
    .sidebar nav a:hover { color:#fff; background:rgba(255,255,255,.06); }
    .sidebar nav a.active { color:#fff; background:rgba(0,99,65,.25); border-left-color:#006341; }
    .sidebar nav a .icon { font-size:14px; width:18px; text-align:center; flex-shrink:0; }
    .sidebar nav a.top-level { padding-left:20px; color:rgba(255,255,255,.65); font-size:14px; }
    .sidebar nav a.top-level .icon { font-size:16px; width:20px; }
    .sidebar .user-bar { padding:16px 20px; border-top:1px solid rgba(255,255,255,.1); font-size:13px; color:rgba(255,255,255,.5); white-space:nowrap; overflow:hidden; }
    .sidebar .user-bar .username { color:#fff; font-weight:600; }
    .sidebar .user-bar button { margin-top:8px; background:none; border:1px solid rgba(255,255,255,.3); color:rgba(255,255,255,.7); padding:4px 12px; border-radius:4px; cursor:pointer; font-size:12px; }
    .sidebar .user-bar button:hover { border-color:#fff; color:#fff; }
    .sidebar .collapse-btn { position:absolute; top:20px; right:-14px; width:28px; height:28px; background:#001529; border:1px solid rgba(255,255,255,.15); border-radius:50%; color:rgba(255,255,255,.6); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:20; transition: all .2s; }
    .sidebar .collapse-btn:hover { background:#006341; color:#fff; border-color:#006341; }
    .sidebar.collapsed .collapse-btn { transform: rotate(180deg); }
    .sidebar { position:relative; }
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .topbar { height:64px; background:#fff; display:flex; align-items:center; padding:0 24px; box-shadow:0 1px 4px rgba(0,0,0,.06); z-index:10; }
    .topbar h2 { font-size:18px; color:#333; }
    .content { flex:1; padding:24px; overflow-y:auto; }
    .page-placeholder { background:#fff; border-radius:8px; padding:48px; text-align:center; color:#999; font-size:15px; }
    /* Toast */
    .toast { position:fixed; top:24px; right:24px; padding:12px 24px; border-radius:8px; color:#fff; font-size:14px; z-index:9999; animation: slideIn .3s ease; }
    .toast.success { background:#006341; }
    .toast.error { background:#ff4d4f; }
    @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
    /* ── 模块化编辑器样式 ── */
    .editor-panel { padding-bottom: 80px; }
    .module-group {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      transition: box-shadow .2s;
    }
    .module-group:hover { box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    .module-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: linear-gradient(to right, #f9fafb, #fff);
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      user-select: none;
    }
    .module-group.collapsed .module-header { border-bottom: 0; }
    .module-icon {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: #f0fdf4;
      border-radius: 8px;
      font-size: 18px;
      flex-shrink: 0;
    }
    .module-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      margin: 0;
    }
    .module-meta {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }
    .module-meta code {
      background: #f3f4f6;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'SF Mono', Menlo, monospace;
      color: #006341;
    }
    .module-toggle {
      margin-left: auto;
      background: none;
      border: 0;
      cursor: pointer;
      padding: 6px;
      color: #9ca3af;
      font-size: 16px;
    }
    .module-toggle:hover { color: #006341; }
    .module-group.collapsed .module-body { display: none; }
    .module-group.collapsed .toggle-icon { transform: rotate(-90deg); display: inline-block; transition: transform .2s; }
    .module-body {
      padding: 18px 20px 4px;
      background: #fff;
    }
  </style>
  <script src="assets/js/json-editor.js?v=20260622-6"></script>
  <script src="assets/js/app.js?v=20260622-6"></script>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="logo"><span>ZSTS CMS</span></div>
  <button class="collapse-btn" onclick="toggleSidebar()" title="收起/展开">◀</button>
  <nav id="navMenu">
    <!-- JS 动态渲染 -->
  </nav>
  <div class="user-bar">
    <div>当前用户：<span class="username" id="dispUsername"></span></div>
    <div style="font-size:11px;margin-top:2px;" id="dispRole"></div>
    <button onclick="logout()">退出登录</button>
  </div>
</div>

<div class="main">
  <div class="topbar" style="display:flex;align-items:center;justify-content:space-between;">
    <h2 id="pageTitle" style="margin:0;">控制台</h2>
    <button onclick="window.openPreviewDirect()" style="background:#006341;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;margin-right:16px;">👁 预览官网</button>
  </div>
  <div class="content" id="pageContent">
    <div class="page-placeholder" id="welcomeMsg"></div>
  </div>
</div>

<script>
const API = '/api';
let currentUser = null;
let currentPage = 'dashboard';

// ── 菜单配置（与官网导航保持一致） ──────────────
const MENU_CONFIG = {
  super_admin: [
    { key:'dashboard',   label:'控制台',   icon:'◈' },
    { key:'global',      label:'全局配置',   icon:'⊚', children:[
      { key:'nav',        label:'导航菜单',  icon:'☰' },
      { key:'footer',     label:'页脚',     icon:'◉' },
      { key:'consultation', label:'咨询弹窗', icon:'✉' },
    ]},
    { key:'pages',       label:'页面内容',   icon:'▤', children:[
      { key:'home',       label:'首页',          icon:'⌂' },
      { key:'saudi-visa', label:'沙特签证',      icon:'✈' },
      { key:'visa',       label:'全球签证',      icon:'🌍' },
      { key:'transport',  label:'境外交通住宿',  icon:'🏨' },
      { key:'insurance',  label:'境外保险',      icon:'🛡️' },
      { key:'enterprise', label:'企业出海',      icon:'🚀' },
      { key:'inspection', label:'企业考察',      icon:'🔍' },
      { key:'about',      label:'关于我们',      icon:'ℹ️' },
    ]},
    { key:'saudi-news',  label:'沙特资讯',   icon:'📰' },
    { key:'users',       label:'账号管理',   icon:'👤' },
    { key:'ai-channels', label:'AI渠道配置', icon:'🤖' },
    { key:'wechat',      label:'微信公众号', icon:'💬' },
    { key:'ai-content', label:'AI内容生成', icon:'✨' },
    { key:'logs',        label:'操作日志',   icon:'📋' },
  ],
  editor: [
    { key:'dashboard',   label:'控制台',   icon:'◈' },
    // children 由 JS 根据 permissions 动态插入
  ],
};

// ── 初始化：验证 token，渲染菜单 ─────────────
async function init() {
  const token = localStorage.getItem('cms_token');
  if (!token) { location.href = '/admin/'; return; }

  try {
    // 加超时，防止 fetch 无限挂起
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 5000);

    const res = await fetch(`${API}/auth/me`, {
      headers: { 'Authorization': 'Bearer ' + token },
      signal: controller.signal,
    });
    clearTimeout(timeoutId);

    if (!res.ok) throw new Error('认证失效');
    currentUser = await res.json();
    renderMenu();
    // 默认跳转到第一个可用页面
    const firstPage = getAvailablePages()[0];
    navigateTo(firstPage?.key || 'dashboard');
  } catch(e) {
    console.error('[CMS] init 失败:', e.message);
    localStorage.clear();
    // 延迟重定向，确保用户能看到错误信息
    setTimeout(() => { location.href = '/admin/'; }, 2000);
  }
}

function getAvailablePages() {
  if (currentUser.role === 'super_admin') return MENU_CONFIG.super_admin;
  // 普通编辑：只显示有权限的页面
  const pages = [{ key:'dashboard', label:'控制台', icon:'◈' }];
  const pageChildren = MENU_CONFIG.super_admin.find(m => m.key==='pages')?.children || [];
  const allowed = pageChildren.filter(p => currentUser.permissions?.includes(p.key));
  if (allowed.length) pages.push({ key:'pages', label:'页面内容', icon:'▤', children: allowed });
  return pages;
}

// ── 渲染侧边栏 ─────────────────────────────────
function renderMenu() {
  const pages = getAvailablePages();
  document.getElementById('dispUsername').textContent = currentUser.username;
  document.getElementById('dispRole').textContent = currentUser.role === 'super_admin' ? '超级管理员' : '编辑';

  let html = '';
  for (const item of pages) {
    if (item.children) {
      const gid = 'grp_' + item.key;
      html += `<div class="group-header open" onclick="toggleGroup('${gid}', this)">`;
      html += `<span class="icon">${item.icon}</span><span>${item.label}</span><span class="arrow">▶</span>`;
      html += `</div>`;
      html += `<div class="group-children" id="${gid}">`;
      for (const child of item.children) {
        if (child.url) {
          html += `<a href="${child.url}" target="_blank" rel="noopener">
            <span class="icon">${child.icon}</span><span class="nav-label">${child.label}</span>
          </a>`;
        } else {
          html += `<a data-page="${child.key}" onclick="navigateTo('${child.key}')">
            <span class="icon">${child.icon}</span><span class="nav-label">${child.label}</span>
          </a>`;
        }
      }
      html += `</div>`;
    } else {
      if (item.url) {
        html += `<a href="${item.url}" target="_blank" rel="noopener" class="top-level">
          <span class="icon">${item.icon}</span><span class="nav-label">${item.label}</span>
        </a>`;
      } else {
        html += `<a data-page="${item.key}" onclick="navigateTo('${item.key}')" class="top-level">
          <span class="icon">${item.icon}</span><span class="nav-label">${item.label}</span>
        </a>`;
      }
    }
  }
  document.getElementById('navMenu').innerHTML = html;
}

function toggleGroup(gid, headerEl) {
  const children = document.getElementById(gid);
  if (!children) return;
  headerEl.classList.toggle('open');
  children.classList.toggle('collapsed');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ── 页面导航 ───────────────────────────────────
function navigateTo(pageKey) {
  currentPage = pageKey;
  // 高亮菜单
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
  const activeLink = document.querySelector(`.sidebar nav a[data-page="${pageKey}"]`);
  if (activeLink) activeLink.classList.add('active');

  // 更新标题
  const labels = {};
  getAvailablePages().forEach(m => {
    if (m.children) m.children.forEach(c => labels[c.key] = c.label);
    labels[m.key] = m.label;
  });
  document.getElementById('pageTitle').textContent = labels[pageKey] || '控制台';

  // 加载页面内容
  loadPage(pageKey);
}

// ── 加载页面内容 ───────────────────────────────
async function loadPage(pageKey) {
  const container = document.getElementById('pageContent');
  if (!container) {
    console.error('pageContent not found');
    return;
  }
  
  try {
    //  dashboard：控制台
    if (pageKey === 'dashboard') {
      renderDashboard(container);
      return;
    }

    //  全局配置页面
    if (['nav','footer','consultation'].includes(pageKey)) {
      if (typeof renderGlobalEditor === 'function') {
        renderGlobalEditor(container, pageKey);
      } else {
        container.innerHTML = '<div class="bg-red-50 p-4 rounded text-red-600">错误：renderGlobalEditor 函数未定义</div>';
      }
      return;
    }

    //  页面内容编辑器
    if (['home','about','visa','saudi-visa','enterprise','transport','insurance','inspection'].includes(pageKey)) {
      if (typeof renderPageEditor === 'function') {
        renderPageEditor(container, pageKey);
      } else {
        container.innerHTML = '<div class="bg-red-50 p-4 rounded text-red-600">错误：renderPageEditor 函数未定义</div>';
      }
      return;
    }

    //  沙特资讯文章管理
    if (pageKey === 'saudi-news') {
      if (typeof renderSaudiNewsPage === 'function') {
        renderSaudiNewsPage(container);
      } else {
        container.innerHTML = '<div class="bg-red-50 p-4 rounded text-red-600">错误：renderSaudiNewsPage 函数未定义</div>';
      }
      return;
    }

    //  账号管理
    if (pageKey === 'users' && currentUser.role === 'super_admin') {
      if (typeof renderUsersPage === 'function') {
        renderUsersPage(container);
      } else {
        container.innerHTML = '<div class="bg-red-50 p-4 rounded text-red-600">错误：renderUsersPage 函数未定义</div>';
      }
      return;
    }

    //  AI 渠道配置
    if (pageKey === 'ai-channels' && currentUser.role === 'super_admin') {
      renderAiChannelsPage(container);
      return;
    }

    //  微信公众号配置
    if (pageKey === 'wechat' && currentUser.role === 'super_admin') {
      if (typeof renderWechatConfigPage === 'function') {
        renderWechatConfigPage(container);
      } else {
        container.innerHTML = '<div class="bg-red-50 p-4 rounded text-red-600">错误：renderWechatConfigPage 函数未定义</div>';
      }
      return;
    }

    //  操作日志
    if (pageKey === 'logs') {
      renderLogsPage(container);
      return;
    }

    //  AI 内容生成（iframe 嵌入，通过代理注入认证 cookie）
    if (pageKey === 'ai-content') {
      const t = localStorage.getItem('cms_token');
      container.innerHTML = `<iframe src="/ai-content?token=${encodeURIComponent(t)}" class="w-full border-none" style="height:calc(100vh - 120px);"></iframe>`;
      return;
    }
    
    container.innerHTML = '<div class="bg-yellow-50 p-4 rounded text-yellow-600">未知页面：' + pageKey + '</div>';
  } catch (e) {
    console.error('loadPage error:', e);
    container.innerHTML = '<div class="bg-red-50 p-4 rounded text-red-600">加载页面时出错：' + e.message + '</div>';
  }
}

// ── 控制台页面 ──────────────────────────────
async function renderDashboard(container) {
  const token = localStorage.getItem('cms_token');
  const headers = { 'Authorization': 'Bearer ' + token };
  const isAdmin = currentUser.role === 'super_admin';

  // 并行请求数据
  const [logsRes, usersRes, channelsRes] = await Promise.all([
    fetch(`${API}/logs?page=1&limit=8`, { headers }).catch(() => null),
    isAdmin ? fetch(`${API}/users`, { headers }).catch(() => null) : Promise.resolve(null),
    fetch(`${API}/ai-channels`, { headers }).catch(() => null),
  ]);

  let logsData = { total: 0, rows: [] };
  let usersData = [];
  let channelsData = [];
  try { if (logsRes?.ok) logsData = await logsRes.json(); } catch(e) {}
  try { if (usersRes?.ok) usersData = await usersRes.json(); } catch(e) {}
  try { if (channelsRes?.ok) channelsData = await channelsRes.json(); } catch(e) {}

  const totalPages = 8; // 可管理页面总数
  const now = new Date();
  const timeStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 ' +
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  const actionMap = {
    login: '登录', create_user: '创建用户', delete_user: '删除用户',
    reset_password: '重置密码', update_permissions: '更新权限',
    update_content: '更新内容', create_ai_channel: '创建AI渠道',
    update_ai_channel: '更新AI渠道', delete_ai_channel: '删除AI渠道',
    set_default_ai_channel: '设置默认渠道',
  };

  container.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:24px;">

      <!-- 欢迎横幅 -->
      <div style="background:linear-gradient(135deg,#006341 0%,#00895a 100%);border-radius:16px;padding:32px 36px;color:#fff;position:relative;overflow:hidden;">
        <div style="position:absolute;right:-30px;top:-30px;width:160px;height:160px;background:rgba(255,255,255,0.06);border-radius:50%;"></div>
        <div style="position:absolute;right:50px;bottom:-40px;width:200px;height:200px;background:rgba(255,255,255,0.04);border-radius:50%;"></div>
        <h2 style="font-size:22px;font-weight:700;margin:0 0 8px;">欢迎回来，${currentUser.username}</h2>
        <p style="margin:0;font-size:14px;opacity:0.85;">${isAdmin ? '你拥有系统完整管理权限，可管理所有配置、账号与系统设置。' : '你可以编辑被授权的页面内容，如需更多权限请联系管理员。'}</p>
        <p style="margin:12px 0 0;font-size:13px;opacity:0.7;">${timeStr} · ${isAdmin ? '超级管理员' : '编辑'}</p>
      </div>

      <!-- 统计卡片 -->
      <div style="display:grid;grid-template-columns:repeat(${isAdmin ? 4 : 2},1fr);gap:16px;">
        <div style="background:#fff;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <div style="width:42px;height:42px;border-radius:12px;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:20px;">📄</div>
            <span style="font-size:13px;color:#888;">管理页面</span>
          </div>
          <div style="font-size:28px;font-weight:700;color:#222;">${totalPages}</div>
        </div>
        ${isAdmin ? `
        <div style="background:#fff;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <div style="width:42px;height:42px;border-radius:12px;background:#e3f2fd;display:flex;align-items:center;justify-content:center;font-size:20px;">👥</div>
            <span style="font-size:13px;color:#888;">系统账号</span>
          </div>
          <div style="font-size:28px;font-weight:700;color:#222;">${usersData.length}</div>
        </div>` : ''}
        ${isAdmin ? `
        <div style="background:#fff;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <div style="width:42px;height:42px;border-radius:12px;background:#f3e5f5;display:flex;align-items:center;justify-content:center;font-size:20px;">🤖</div>
            <span style="font-size:13px;color:#888;">AI 渠道</span>
          </div>
          <div style="font-size:28px;font-weight:700;color:#222;">${channelsData.length}</div>
        </div>` : ''}
        <div style="background:#fff;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <div style="width:42px;height:42px;border-radius:12px;background:#fff3e0;display:flex;align-items:center;justify-content:center;font-size:20px;">📋</div>
            <span style="font-size:13px;color:#888;">操作日志</span>
          </div>

// ── 账号管理页面（超级管理员）──────────────────
async function renderUsersPage(container) {
  const token = localStorage.getItem('cms_token');
  const res = await fetch(`${API}/users`, { headers:{'Authorization':'Bearer '+token} });
  const users = await res.json();

  let html = `
    <div style="background:#fff;border-radius:8px;padding:24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h3 style="color:#333;">账号管理</h3>
        <button onclick="showCreateUserModal()" style="background:#006341;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;">+ 新建账号</button>
      </div>
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr style="background:#fafafa;">
          <th style="padding:12px;text-align:left;">用户名</th>
          <th style="padding:12px;text-align:left;">角色</th>
          <th style="padding:12px;text-align:left;">最后登录</th>
          <th style="padding:12px;text-align:left;">操作</th>
        </tr></thead>
        <tbody>`;
  for (const u of users) {
    html += `<tr style="border-bottom:1px solid #f0f0f0;">
      <td style="padding:12px;">${u.username}</td>
      <td style="padding:12px;">${u.role==='super_admin'?'超级管理员':'编辑'}</td>
      <td style="padding:12px;color:#999;font-size:13px;">${u.last_login||'—'}</td>
      <td style="padding:12px;">
        <button onclick="resetPassword(${u.id},'${u.username}')" style="background:none;border:1px solid #d9d9d9;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;margin-right:6px;">重置密码</button>
        <button onclick="editPermissions(${u.id},'${u.username}')" style="background:none;border:1px solid #d9d9d9;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;margin-right:6px;">权限</button>
        ${u.id !== currentUser.id ? `<button onclick="deleteUser(${u.id},'${u.username}')" style="background:none;border:1px solid #ff4d4f;color:#ff4d4f;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;">删除</button>` : ''}
      </td>
    </tr>`;
  }
  html += `</tbody></table></div>`;
  container.innerHTML = html;
}

window.showCreateUserModal = function() {
  const modal = document.createElement('div');
  modal.id = 'userModal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);';
  modal.innerHTML = `
    <div style="background:#fff;border-radius:12px;max-width:480px;width:100%;margin:0 16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2);" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h3 style="font-size:18px;font-weight:700;color:#111;">新建账号</h3>
        <button onclick="document.getElementById('userModal').remove()" style="background:none;border:none;font-size:24px;color:#999;cursor:pointer;">&times;</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:6px;">用户名</label>
          <input type="text" id="newUsername" placeholder="请输入用户名" style="width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none;" onfocus="this.style.borderColor='#006341'" onblur="this.style.borderColor='#d1d5db'">
        </div>
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:6px;">密码（至少6位）</label>
          <input type="password" id="newPassword" placeholder="请输入密码" style="width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none;" onfocus="this.style.borderColor='#006341'" onblur="this.style.borderColor='#d1d5db'">
        </div>
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:6px;">角色</label>
          <select id="newRole" style="width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none;">
            <option value="editor">编辑</option>
            <option value="super_admin">超级管理员</option>
          </select>
        </div>
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:6px;">页面权限</label>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;" id="newPermCheckboxes">
            ${['home','about','visa','saudi-visa','enterprise','transport','insurance','inspection','global'].map(p => 
              `<label style="display:inline-flex;align-items:center;gap:4px;font-size:13px;color:#555;"><input type="checkbox" value="${p}" style="accent-color:#006341;"> ${{'home':'首页','about':'关于','visa':'全球签证','saudi-visa':'沙特签证','enterprise':'企业出海','transport':'交通住宿','insurance':'境外保险','inspection':'企业考察','global':'全局配置'}[p]}</label>`
            ).join('')}
          </div>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:24px;">
        <button onclick="document.getElementById('userModal').remove()" style="padding:8px 20px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#666;cursor:pointer;font-size:14px;">取消</button>
        <button onclick="doCreateUser()" style="padding:8px 20px;background:#006341;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">创建</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
};

window.doCreateUser = async function() {
  const username = document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value;
  const role = document.getElementById('newRole').value;
  const permissions = [];
  document.querySelectorAll('#newPermCheckboxes input[type=checkbox]:checked').forEach(cb => permissions.push(cb.value));
  
  if (!username || !password) { alert('用户名和密码不能为空'); return; }
  if (password.length < 6) { alert('密码至少6位'); return; }
  
  const token = localStorage.getItem('cms_token');
  const res = await fetch(`${API}/users`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ username, password, role, permissions }),
  });
  if (res.ok) {
    alert('账号创建成功');
    document.getElementById('userModal').remove();
    location.reload();
  } else {
    const err = await res.json().catch(() => ({}));
    alert('创建失败：' + (err.error || '未知错误'));
  }
};

window.resetPassword = async function(id, username) {
  const pwd = prompt(`请输入「${username}」的新密码（至少6位）：`);
  if (!pwd || pwd.length < 6) return alert('密码至少6位');
  const token = localStorage.getItem('cms_token');
  const res = await fetch(`${API}/users/${id}`, {
    method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body: JSON.stringify({password: pwd}),
  });
  alert(res.ok ? '密码已重置' : '操作失败');
  if (res.ok) location.reload();
};

window.deleteUser = async function(id, username) {
  if (!confirm(`确认删除账号「${username}」？`)) return;
  const token = localStorage.getItem('cms_token');
  const res = await fetch(`${API}/users/${id}`, {
    method:'DELETE', headers:{'Authorization':'Bearer '+token},
  });
  alert(res.ok ? '账号已删除' : '操作失败');
  if (res.ok) location.reload();
};

window.editPermissions = async function(id, username) {
  const token = localStorage.getItem('cms_token');
  // 先获取当前用户权限
  let userPerms = [];
  try {
    const usersRes = await fetch(`${API}/users`, { headers: { 'Authorization': 'Bearer ' + token } });
    if (usersRes.ok) {
      const users = await usersRes.json();
      const user = users.find(u => u.id === id);
      if (user) userPerms = user.permissions || [];
    }
  } catch(e) {}

  const ALL_PAGES = [
    { key: 'home', label: '首页' },
    { key: 'about', label: '关于我们' },
    { key: 'visa', label: '全球签证' },
    { key: 'saudi-visa', label: '沙特签证' },
    { key: 'enterprise', label: '企业出海' },
    { key: 'transport', label: '交通住宿' },
    { key: 'insurance', label: '境外保险' },
    { key: 'inspection', label: '企业考察' },
    { key: 'global', label: '全局配置' },
  ];

  const modal = document.createElement('div');
  modal.id = 'permModal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);';
  modal.innerHTML = `
    <div style="background:#fff;border-radius:12px;max-width:480px;width:100%;margin:0 16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2);" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h3 style="font-size:18px;font-weight:700;color:#111;">编辑权限 — ${username}</h3>
        <button onclick="document.getElementById('permModal').remove()" style="background:none;border:none;font-size:24px;color:#999;cursor:pointer;">&times;</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px;" id="permCheckboxes">
        ${ALL_PAGES.map(p => 
          `<label style="display:inline-flex;align-items:center;gap:6px;font-size:14px;color:#333;padding:6px 12px;border:1px solid ${userPerms.includes(p.key) ? '#006341' : '#e5e7eb'};border-radius:8px;background:${userPerms.includes(p.key) ? '#e6f4ec' : '#fff'};cursor:pointer;transition:all .15s;">
            <input type="checkbox" value="${p.key}" ${userPerms.includes(p.key) ? 'checked' : ''} style="accent-color:#006341;width:16px;height:16px;">
            ${p.label}
          </label>`
        ).join('')}
      </div>
      <p style="font-size:12px;color:#999;margin:8px 0 0;">超级管理员自动拥有所有权限，无需单独设置。</p>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:24px;">
        <button onclick="document.getElementById('permModal').remove()" style="padding:8px 20px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#666;cursor:pointer;font-size:14px;">取消</button>
        <button onclick="doSavePermissions(${id})" style="padding:8px 20px;background:#006341;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">保存权限</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  // 绑定 checkbox 点击样式切换
  modal.querySelectorAll('#permCheckboxes input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', function() {
      const label = this.closest('label');
      if (this.checked) {
        label.style.borderColor = '#006341';
        label.style.background = '#e6f4ec';
      } else {
        label.style.borderColor = '#e5e7eb';
        label.style.background = '#fff';
      }
    });
  });
};

window.doSavePermissions = async function(id) {
  const permissions = [];
  document.querySelectorAll('#permCheckboxes input[type=checkbox]:checked').forEach(cb => permissions.push(cb.value));
  const token = localStorage.getItem('cms_token');
  const res = await fetch(`${API}/users/${id}/permissions`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ permissions }),
  });
  if (res.ok) {
    alert('权限已更新');
    document.getElementById('permModal').remove();
    location.reload();
  } else {
    const err = await res.json().catch(() => ({}));
    alert('保存失败：' + (err.error || '未知错误'));
  }
};

function logout() {
  localStorage.clear();
  location.href = '/admin/';
}

init();
